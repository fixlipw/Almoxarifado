spring:
  config:
    activate:
      on-profile: dev

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:almoxarifado_dev;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    hikari:
      maximum-pool-size: 2

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  liquibase:
    enabled: false

logging:
  level:
    org:
      hibernate:
        orm:
          jdbc:
            bind: trace
  pattern:
    console: "%clr(%d{yyyy-MM-dd'T'HH:mm:ss.SSS}){faint} %clr([%-5level]) %clr(${AEC:- }){magenta} %clr([%15.15t]){faint} %clr(%-40.40logger{36}){cyan} %clr([%file:%line]){green} %clr(:){faint} %m%n"
