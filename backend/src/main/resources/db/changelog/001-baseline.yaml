databaseChangeLog:
  - changeSet:
      id: 1774468867276-1

      author: desou
      comment: Cria tabela bloqueios
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - createTable:
            columns:
              - column:
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_bloqueios
                  name: id
                  type: UUID
              - column:
                  constraints:
                    nullable: false
                  name: usuario_id
                  type: UUID
              - column:
                  constraints:
                    nullable: false
                  name: admin_block_id
                  type: UUID
              - column:
                  name: admin_unblock_id
                  type: UUID
              - column:
                  name: motivo_desbloqueio
                  type: TEXT
              - column:
                  constraints:
                    nullable: false
                  name: motivo_bloqueio
                  type: TEXT
              - column:
                  constraints:
                    nullable: false
                  name: data_bloqueio
                  type: DATETIME
              - column:
                  name: data_desbloqueio
                  type: DATETIME
            tableName: bloqueios
