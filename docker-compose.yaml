services:
  postgres:
    image: postgres:15
    container_name: almoxarifado_postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: almoxarifado
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: